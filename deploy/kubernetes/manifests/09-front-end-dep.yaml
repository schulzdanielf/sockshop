---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  namespace: sock-shop
  labels:
    name: front-end
spec:
  replicas: 1
  selector:
    matchLabels:
      name: front-end
  template:
    metadata:
      labels:
        name: front-end
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "frontend-nodejs"
    spec:
      containers:
      - name: front-end
        image: weaveworksdemos/front-end:node18-otel
        resources:
          limits:
            cpu: 300m
            memory: 1000Mi
          requests:
            cpu: 100m
            memory: 300Mi
        ports:
        - containerPort: 8079
        env:
        - name: SESSION_REDIS
          value: "true"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # HTTP_PROXY/HTTPS_PROXY removidos: com OTel SDK ativo o 'request' lib via proxy
        # mascararia os destinos reais (spans mostrariam 127.0.0.1:15001 em vez de carts, catalogue...)
        # O exporter OTel usa http nativo que ignora HTTP_PROXY por padrão.
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - all
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /
            port: 8079
          initialDelaySeconds: 300
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8079
          initialDelaySeconds: 30
          periodSeconds: 3
      - name: front-end-envoy
        image: envoyproxy/envoy:v1.30.2
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --log-level
        - warning
        ports:
        - containerPort: 15001
          name: envoy-proxy
        - containerPort: 9901
          name: envoy-admin
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: front-end-envoy-config
          mountPath: /etc/envoy
          readOnly: true
      nodeSelector:
        beta.kubernetes.io/os: linux
      volumes:
      - name: front-end-envoy-config
        configMap:
          name: front-end-envoy-config