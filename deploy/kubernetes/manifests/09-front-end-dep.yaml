---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  namespace: sock-shop
  labels:
    name: front-end
spec:
  replicas: 1
  selector:
    matchLabels:
      name: front-end
  template:
    metadata:
      labels:
        name: front-end
    spec:
      containers:
      - name: front-end
        image: weaveworksdemos/front-end:0.3.12
        resources:
          limits:
            cpu: 300m
            memory: 1000Mi
          requests:
            cpu: 100m
            memory: 300Mi
        ports:
        - containerPort: 8079
        env:
        - name: SESSION_REDIS
          value: "true"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HTTP_PROXY
          value: http://127.0.0.1:15001
        - name: HTTPS_PROXY
          value: http://127.0.0.1:15001
        - name: NO_PROXY
          value: 127.0.0.1,localhost,$(POD_IP),front-end,front-end.sock-shop.svc,front-end.sock-shop.svc.cluster.local,.svc,.cluster.local
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - all
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /
            port: 8079
          initialDelaySeconds: 300
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8079
          initialDelaySeconds: 30
          periodSeconds: 3
      - name: front-end-envoy
        image: envoyproxy/envoy:v1.30.2
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --log-level
        - warning
        ports:
        - containerPort: 15001
          name: envoy-proxy
        - containerPort: 9901
          name: envoy-admin
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: front-end-envoy-config
          mountPath: /etc/envoy
          readOnly: true
      nodeSelector:
        beta.kubernetes.io/os: linux
      volumes:
      - name: front-end-envoy-config
        configMap:
          name: front-end-envoy-config