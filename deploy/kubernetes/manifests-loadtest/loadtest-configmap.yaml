---
apiVersion: v1
kind: Namespace
metadata:
  name: loadtest
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-script
  namespace: loadtest
data:
  locustfile.py: |
    import random
    from uuid import uuid4

    from locust import HttpUser, between, task


    class SockShopUser(HttpUser):
        wait_time = between(1, 3)

        def on_start(self):
            self.username = f"user_{uuid4().hex[:8]}"
            self.password = "Passw0rd!"
            self.email = f"{self.username}@example.com"
            self.customer_id = None

            self._register()
            self._login()
            self._resolve_customer_id()

        def _register(self):
            payload = {
                "username": self.username,
                "password": self.password,
                "email": self.email,
            }
            self.client.post("/register", json=payload, name="POST /register")

        def _login(self):
            payload = {
                "username": self.username,
                "password": self.password,
            }
            self.client.post("/login", json=payload, name="POST /login")

        def _resolve_customer_id(self):
            with self.client.get("/customer", name="GET /customer", catch_response=True) as resp:
                if resp.status_code != 200:
                    resp.failure(f"customer lookup failed: {resp.status_code}")
                    return

                try:
                    data = resp.json()
                    self.customer_id = data.get("id")
                    if not self.customer_id:
                        resp.failure("customer id not found in /customer response")
                except Exception as exc:
                    resp.failure(f"invalid /customer json: {exc}")

        def _pick_catalogue_item(self):
            with self.client.get("/catalogue?size=9", name="GET /catalogue", catch_response=True) as resp:
                if resp.status_code != 200:
                    resp.failure(f"catalogue failed: {resp.status_code}")
                    return None

                try:
                    items = resp.json()
                    if isinstance(items, list) and items:
                        return random.choice(items).get("id")
                    resp.failure("catalogue returned empty list")
                    return None
                except Exception as exc:
                    resp.failure(f"invalid catalogue json: {exc}")
                    return None

        def _add_to_cart(self, item_id):
            payload = {"id": item_id, "quantity": 1}
            with self.client.post("/cart", json=payload, name="POST /cart", catch_response=True) as resp:
                if resp.status_code not in (200, 201, 202):
                    resp.failure(f"add to cart failed: {resp.status_code}")

        def _create_address(self):
            number = random.randint(10, 9999)
            payload = {
                "number": str(number),
                "street": "Rua de Teste",
                "city": "Sao Paulo",
                "postcode": "01001-000",
                "country": "Brazil",
            }
            with self.client.post("/addresses", json=payload, name="POST /addresses", catch_response=True) as resp:
                if resp.status_code not in (200, 201):
                    resp.failure(f"create address failed: {resp.status_code}")
                    return None

                try:
                    data = resp.json()
                    return data.get("id")
                except Exception as exc:
                    resp.failure(f"invalid address json: {exc}")
                    return None

        def _create_card(self):
            payload = {
                "longNum": "5555555555554444",
                "expires": "12/30",
                "ccv": "123",
            }
            with self.client.post("/cards", json=payload, name="POST /cards", catch_response=True) as resp:
                if resp.status_code not in (200, 201):
                    resp.failure(f"create card failed: {resp.status_code}")
                    return None

                try:
                    data = resp.json()
                    return data.get("id")
                except Exception as exc:
                    resp.failure(f"invalid card json: {exc}")
                    return None

        def _checkout(self, address_id, card_id):
            if not (self.customer_id and address_id and card_id):
                return

            payload = {
                "customerId": self.customer_id,
                "address": address_id,
                "card": card_id,
            }
            with self.client.post("/orders", json=payload, name="POST /orders", catch_response=True) as resp:
                if resp.status_code not in (200, 201, 202):
                    resp.failure(f"checkout failed: {resp.status_code}")

        @task
        def realistic_journey(self):
            self.client.get("/", name="GET /")
            self.client.get("/category.html", name="GET /category.html")

            item_id = self._pick_catalogue_item()
            if item_id:
                self._add_to_cart(item_id)

            self.client.get("/cart.html", name="GET /cart.html")
            self.client.get("/login", name="GET /login")

            # Re-login occasionally to mimic realistic session churn.
            if random.random() < 0.2:
                self._login()
                self._resolve_customer_id()

            address_id = self._create_address()
            card_id = self._create_card()
            self._checkout(address_id, card_id)

            self.client.get("/customer-orders.html", name="GET /customer-orders.html")
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-web
  namespace: loadtest
  labels:
    app: locust-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-web
  template:
    metadata:
      labels:
        app: locust-web
    spec:
      containers:
      - name: locust
        image: locustio/locust:2.27.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - |
          exec locust \
            -f /mnt/locust/locustfile.py \
            --host "$TARGET_HOST" \
            --web-host 0.0.0.0 \
            --web-port 8089
        env:
        - name: TARGET_HOST
          value: http://front-end.sock-shop.svc.cluster.local
        - name: LOCUST_WEB_PORT
          value: "8089"
        ports:
        - containerPort: 8089
          name: web
        volumeMounts:
        - name: locust-script
          mountPath: /mnt/locust
      volumes:
      - name: locust-script
        configMap:
          name: locust-script
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: locust-web
  namespace: loadtest
spec:
  selector:
    app: locust-web
  ports:
  - name: web
    port: 8089
    targetPort: 8089
