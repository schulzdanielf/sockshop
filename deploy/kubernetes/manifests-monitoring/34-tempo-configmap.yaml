apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
            http:

    ingester:
      max_block_duration: 5m
      lifecycler:
        ring:
          replication_factor: 1
      trace_idle_period: 10s
      flush_check_period: 10s
      max_block_bytes: 100_000_000

    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics
      max_traces_per_user: 50000
      max_global_traces_per_user: 0

    compactor:
      compaction:
        block_retention: 24h

    storage:
      trace:
        backend: local
        wal:
          path: /tmp/tempo/wal
        local:
          path: /tmp/tempo/blocks

    querier:
      frontend_worker:
        frontend_address: 127.0.0.1:9095

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: k8s
      storage:
        path: /tmp/tempo/generator/wal
        remote_write:
          - url: http://prometheus-v3.monitoring.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
      processor:
        service_graphs:
          dimensions:
            - db.system
          peer_attributes:
            - db.system
            - net.peer.name
            - messaging.system
          enable_messaging_system_latency_histogram: true
        span_metrics:
          dimensions:
            - db.system
            - db.operation

    query_frontend:
      search:
        duration_slo: 5s
        throughput_bytes_slo: 1073741824
