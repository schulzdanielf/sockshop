apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v12
          index:
            prefix: index_
            period: 24h

    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

    ingester:
      # Flush mais cedo para reduzir memoria residente por stream.
      chunk_idle_period: 1m
      max_chunk_age: 10m
      chunk_retain_period: 30s

    ruler:
      alertmanager_url: http://localhost:9093

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 24h
      retention_period: 24h
      # Limites mais conservadores para reduzir picos de uso de memoria.
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8
      per_stream_rate_limit: 2MB
      per_stream_rate_limit_burst: 4MB
      max_query_parallelism: 2
      max_entries_limit_per_query: 2000

    analytics:
      reporting_enabled: false
