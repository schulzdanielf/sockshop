apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/containers/*_sock-shop_*.log
        start_at: beginning
        include_file_path: true
        include_file_name: true
        operators:
          - type: json_parser
            parse_from: body
            parse_to: attributes
            on_error: send
          - type: time_parser
            parse_from: attributes.time
            layout_type: gotime
            layout: '2006-01-02T15:04:05.999999999Z07:00'
            if: attributes.time != nil
          - type: move
            from: attributes.log
            to: body
            if: attributes.log != nil
          - type: remove
            field: attributes.time
            if: attributes.time != nil
          - type: remove
            field: attributes.stream
            if: attributes.stream != nil
          - type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^.*/(?P<pod>[^_]+)_(?P<namespace>[^_]+)_(?P<container>.+)-[a-f0-9]{64}\.log$'
            parse_to: attributes
            on_error: send
      prometheus:
        config:
          scrape_configs:
            - job_name: prometheus-federation
              honor_labels: true
              metrics_path: /federate
              params:
                'match[]':
                  - '{__name__=~".+"}'
              static_configs:
                - targets:
                    - prometheus.monitoring.svc.cluster.local:9090
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      zipkin:
        endpoint: 0.0.0.0:9411

    processors:
      attributes/log_source:
        actions:
          - action: upsert
            key: log_source
            value: otel_filelog
      transform/log_enrichment:
        log_statements:
          - context: log
            statements:
              - set(attributes["service"], resource.attributes["service.name"]) where resource.attributes["service.name"] != nil
              - set(attributes["service"], attributes["container"]) where attributes["service"] == nil and attributes["container"] != nil
              - replace_pattern(body, "\\x1b\\[[0-9;]*m", "")
              - set(attributes["level"], "error") where IsMatch(body, "(status[_-]?code?|result|HTTP/[0-9.]+)[ =:\"]+5[0-9]{2}[^0-9]|\\s5[0-9]{2}\\s")
              - set(attributes["level"], "warn") where attributes["level"] == nil and IsMatch(body, "(status[_-]?code?|result|HTTP/[0-9.]+)[ =:\"]+4[0-9]{2}[^0-9]|\\s4[0-9]{2}\\s")
              - set(attributes["level"], "error") where attributes["level"] == nil and IsMatch(body, "(?i)(error|exception|fatal)")
              - set(attributes["level"], "warn") where attributes["level"] == nil and IsMatch(body, "(?i)warn(ing)?")
              - set(attributes["level"], "info") where attributes["level"] == nil
              - set(attributes["msg"], body)
              - set(attributes["msg"], ExtractPatterns(body, "^[^#]*#\\s*(?P<clean>.*)$")["clean"]) where IsMatch(body, "^[^#]*#\\s*.+")
              - set(attributes["error_type"], "exception") where IsMatch(body, "(?i)exception")
              - set(attributes["error_type"], "fatal") where attributes["error_type"] == nil and IsMatch(body, "(?i)fatal")
              - set(attributes["error_type"], "error") where attributes["error_type"] == nil and IsMatch(body, "(?i)error")
              - set(attributes["error_fingerprint"], "redis_background_save_error") where IsMatch(body, "(?i)background saving error")
              - set(attributes["error_fingerprint"], "connection_refused") where attributes["error_fingerprint"] == nil and IsMatch(body, "(?i)connection refused")
              - set(attributes["error_fingerprint"], "timeout_error") where attributes["error_fingerprint"] == nil and IsMatch(body, "(?i)timeout")
              - set(attributes["error_fingerprint"], "generic_exception") where attributes["error_fingerprint"] == nil and IsMatch(body, "(?i)exception")
              - set(attributes["error_fingerprint"], "generic_error") where attributes["error_fingerprint"] == nil and IsMatch(body, "(?i)error")
      attributes/loki_format:
        actions:
          - action: upsert
            key: loki.format
            value: raw
      attributes/loki_labels:
        actions:
          - action: upsert
            key: loki.attribute.labels
            value: log_source,namespace,pod,container,service,level,error_type,error_fingerprint
      batch: {}

    exporters:
      debug/logs:
        verbosity: detailed
      loki:
        endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      prometheusremotewrite:
        endpoint: http://prometheus-v3.monitoring.svc.cluster.local:9090/api/v1/write
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus, otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]
        traces:
          receivers: [otlp, zipkin]
          processors: [batch]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp, filelog]
          processors: [attributes/log_source, transform/log_enrichment, attributes/loki_format, attributes/loki_labels, batch]
          exporters: [debug/logs, loki]
