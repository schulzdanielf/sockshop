apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: prometheus-federation
              honor_labels: true
              metrics_path: /federate
              params:
                'match[]':
                  - '{__name__=~".+"}'
              static_configs:
                - targets:
                    - prometheus.monitoring.svc.cluster.local:9090
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: normal
      prometheusremotewrite:
        endpoint: http://prometheus-v3.monitoring.svc.cluster.local:9090/api/v1/write
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus, otlp]
          processors: [batch]
          exporters: [debug, prometheusremotewrite]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
