apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/containers/*.log
        start_at: end
        include_file_path: true
        operators:
          - type: container
          - type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^.*/(?P<pod>[^_]+)_(?P<namespace>[^_]+)_(?P<container>.+)-[^-]+\.log$'
      prometheus:
        config:
          scrape_configs:
            - job_name: prometheus-federation
              honor_labels: true
              metrics_path: /federate
              params:
                'match[]':
                  - '{__name__=~".+"}'
              static_configs:
                - targets:
                    - prometheus.monitoring.svc.cluster.local:9090
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      attributes/loki_labels:
        actions:
          - action: upsert
            key: loki.attribute.labels
            value: namespace,pod,container
      batch: {}

    exporters:
      debug:
        verbosity: normal
      loki:
        endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      prometheusremotewrite:
        endpoint: http://prometheus-v3.monitoring.svc.cluster.local:9090/api/v1/write
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus, otlp]
          processors: [batch]
          exporters: [debug, prometheusremotewrite]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp/tempo]
        logs:
          receivers: [otlp, filelog]
          processors: [attributes/loki_labels, batch]
          exporters: [debug, loki]
