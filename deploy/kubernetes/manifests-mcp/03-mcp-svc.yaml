apiVersion: v1
kind: Service
metadata:
  name: mcp-observability
  namespace: mcp-server
  labels:
    app: mcp-observability
  annotations:
    description: "MCP Server for Prometheus and Loki queries"
spec:
  type: ClusterIP
  selector:
    app: mcp-observability
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
